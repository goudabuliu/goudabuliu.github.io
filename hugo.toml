baseURL = "https://goudabuliu.github.io"
languageCode = "zh-CN"
title = "我的学习笔记"
theme = "hugo-theme-stack"

[params]
  # 头像                                                                                                                                       
  gravatarEmail = "zjw1948@outlook.com"                                                                                                                                                                                                                                                     
  mode = "auto"
  description = "每天进步一点点"
  # 显示阅读时间
  ShowReadingTime = true
  # 显示分享按钮
  ShowShareButtons = true
  # 显示上一篇/下一篇文章导航
  ShowPostNavLinks = true
  # 显示文章目录
  ShowToc = true
  # 显示代码复制按钮
  ShowCodeCopyButtons = true
  # 启用搜索功能
  Search = true
  # 主页显示文章数
  postsPerPage = 10
  # 自定义CSS (注释掉，因为主题已更换为 hugo-theme-stack)
  # customCSS = ["css/custom.css"]

# 分类配置
[taxonomies]
  category = "categories"
  tag = "tags"

# 菜单配置
[[menu.main]]
  name = "🏠 首页"
  url = "/"
  weight = 1

[[menu.main]]
  name = "📚 分类"
  url = "/categories/"
  weight = 2

[[menu.main]]
  name = "🗂️ 归档"
  url = "/archives/"
  weight = 3

[[menu.main]]
  name = "📝 标签"
  url = "/tags/"
  weight = 4

[[menu.main]]
  name = "ℹ️ 关于"
  url = "/about/"
  weight = 5

# 社交媒体链接 (可选)
[params.social]
  GitHub = "goudabuliu"
  # 可以添加更多: Twitter, LinkedIn, Email 等
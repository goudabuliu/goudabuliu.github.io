name: Deploy Hugo site to Pages

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build
        run: hugo --minify

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          # 注意：这会用public/目录的内容覆盖master分支的根目录
          # 建议先备份重要文件，或使用单独的发布分支
          keep_files: false
          # 如果要保留源代码，考虑使用单独的gh-pages分支
          # publish_branch: gh-pages
          # 然后在GitHub Pages设置中切换发布分支